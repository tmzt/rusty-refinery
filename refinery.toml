[options]
default_agent = "coder"
default_planner = "planner"
repos_path = "./repos/submodules"
submodules_path = "./submodules"
github_account = "tmzt"
# github_remote_name = "github"  # default

[templates.coder]
command = "claude"
args = ["-p", "Implement the task described in the PRD."]
env = { "BEAD_ID" = "{BEAD_ID}" }

[templates.planner]
command = "claude"
args = ["-p", "Review and create implementation plan"]
env = { "BEAD_ID" = "{BEAD_ID}" }

[templates.gemini_planner]
command = "gemini"
args = ["--prompt", "Review and create implementation plan"]
env = { "BEAD_ID" = "{BEAD_ID}" }

[templates.codex_coder]
command = "codex"
args = ["Implement the task described in the PRD."]
env = { "BEAD_ID" = "{BEAD_ID}" }
